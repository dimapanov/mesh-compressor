<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2328; }</style>
  </defs>
  <rect width="720" height="260" fill="#ffffff" rx="8"/>

  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="600">Cyrillic characters per packet (233-byte limit)</text>

  <text x="192" y="68" text-anchor="end" font-size="12" fill="#6b7280">UTF-8 raw</text>
  <rect x="200" y="55" width="93" height="28" rx="4" fill="#9ca3af"/>
  <text x="300" y="74" font-size="12" fill="#6b7280">116 chars</text>

  <text x="192" y="116" text-anchor="end" font-size="12" fill="#6b7280">Unishox2</text>
  <rect x="200" y="103" width="168" height="28" rx="4" fill="#f59e0b"/>
  <text x="376" y="122" font-size="12" fill="#92400e">~210 chars</text>
  <text x="460" y="122" font-size="11" fill="#6b7280">1.8x</text>

  <text x="192" y="164" text-anchor="end" font-size="12" fill="#6b7280">n-gram + AC</text>
  <rect x="200" y="151" width="480" height="28" rx="4" fill="#16a34a"/>
  <text x="520" y="170" font-size="13" fill="#ffffff" font-weight="600">600+ chars</text>
  <text x="688" y="170" font-size="13" fill="#16a34a" font-weight="700">5x</text>

  <text x="360" y="215" text-anchor="middle" font-size="13" fill="#16a34a">✓ 2000/2000 roundtrip verified — 100% lossless</text>
  <text x="360" y="242" text-anchor="middle" font-size="11" fill="#9ca3af">Meshtastic packet payload: 233 bytes • LoRa radio • no internet needed</text>
</svg>
