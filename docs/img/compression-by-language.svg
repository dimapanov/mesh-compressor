<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2328; }</style>
  </defs>
  <rect width="800" height="520" fill="#ffffff" rx="8"/>

  <text x="400" y="32" text-anchor="middle" font-size="15" font-weight="600">Compression ratio by language — universal model (10 languages, 3.5 MB)</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#6b7280">% of original UTF-8 size saved · higher is better</text>

